<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Tree Template - Neobrutalism</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* RESET E FUNDO */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        /* SISTEMA DE ONDAS (SEA) */
        .sea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 -5px 8px #51ff00) blur(3px) contrast(5);
            z-index: 1;
            pointer-events: none;
        }

        .wave_graphic {
            width: 1vw;
            min-width: 10px;
            height: 40px;
            background: linear-gradient(180deg, #ffffff 0%, #51ff00 100%);
        }

        .wave_fade { animation: fade 1400ms ease-in-out infinite alternate; }
        .wave_skew { animation: skew 2000ms ease-in-out infinite alternate; }
        .wave_translate { animation: translate 2000ms ease-in-out infinite alternate; }

        @keyframes fade { 0%, 5% { opacity: 0.1; } 100% { opacity: 0.8; } }
        @keyframes skew { 0% { transform: skewY(-17.5deg); } 100% { transform: skewY(17.5deg); } }
        @keyframes translate { 0% { transform: translateY(130px); } 100% { transform: translateY(-130px); } }

        /* CARD VAZIO (ESTRUTURA) */
        .card {
            background-color: #ffffff;
            width: 350px;
            padding: 40px 25px;
            border-radius: 20px;
            border: 4px solid #000;
            box-shadow: 12px 12px 0px #51ff009b;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .profile-placeholder {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #000;
            margin: 0 auto 15px;
            background-color: #eee;
        }

        .title-placeholder {
            font-family: 'Anton', sans-serif;
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #000;
        }

        .text-placeholder {
            font-size: 14px;
            color: #555;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* BOTÕES VAZIOS */
        .link-placeholder {
            display: block;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
            transition: 0.2s;
        }

        .link-placeholder:hover {
            transform: translate(-3px, -3px);
            box-shadow: 7px 7px 0px #51ff00c3;
            background-color: #f0f7ff;
        }
    </style>
</head>
<body>

    <div class="sea" id="waveContainer"></div>

    <div class="card">
        <div class="profile-placeholder"></div>
        <h1 class="title-placeholder">Matheus Diógenes Lima</h1>
        <p class="text-placeholder">Dev</p>

        <a href="https://github.com/Matheusdiogenes951" class="link-placeholder">Git Hub</a>
        <a href="https://www.instagram.com/matheus_diogenesl/" class="link-placeholder">instagram</a>
        <a href="https://www.linkedin.com/in/matheus-di%C3%B3genes-493478396/" class="link-placeholder">Linkedin</a>
    </div>

    <script>
        /* SCRIPT PARA GERAR AS 100 CAMADAS DA ONDA */
        const container = document.getElementById('waveContainer');
        const waveCount = 100;
        const waveDuration = 2000;

        for (let i = 1; i <= waveCount; i++) {
            const wave = document.createElement('div');
            wave.className = 'wave';
            const delay = (i * -waveDuration) / waveCount;
            const translateDelay = delay - (waveDuration / 2);

            wave.innerHTML = `
                <div class="wave_fade" style="animation-delay: ${delay}ms">
                    <div class="wave_skew" style="animation-delay: ${delay}ms">
                        <div class="wave_translate" style="animation-delay: ${translateDelay}ms">
                            <div class="wave_graphic"></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(wave);
        }
    </script>
</body>
</html>
