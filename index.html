<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Diógenes | Portfólio Avançado</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="estilos/style.css">

</head>
<body>

    <div class="glass-card">
        <div class="profile-pic">
            <img src="https://avatars.githubusercontent.com/u/74624133?v=4" alt="Matheus Diógenes Lima">
        </div>
        <h1>MATHEUS DIÓGENES LIMA</h1>
        <p>Fullstack Developer | Mobile Dev</p>

        <a href="https://github.com/Matheusdiogenes951" target="_blank" class="btn">
            <i class="fab fa-github"></i> GitHub
        </a>
        <a href="https://www.linkedin.com/in/matheus-di%C3%B3genes-493478396/" target="_blank" class="btn">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>
        <a href="https://www.instagram.com/matheus_diogenesl/" target="_blank" class="btn">
            <i class="fab fa-instagram"></i> Instagram
        </a>

    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <script>
        VanillaTilt.init(document.querySelector(".glass-card"), {
            max: 18,          // Ângulo máximo de inclinação um pouco maior
            speed: 500,       // Velocidade da transição
            glare: true,      // Ativa o efeito de "brilho"
            "max-glare": 0.3, // Intensidade do brilho um pouco maior
            scale: 1.05       // Leve zoom no cartão
        });
    </script>

</body>
